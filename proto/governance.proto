// Walacor Gateway — gRPC interface between Go proxy and Python governance sidecar.
//
// The Go proxy handles HTTP ingress, TLS, connection pooling, and LLM provider
// forwarding.  All governance intelligence (policy evaluation, content analysis,
// session chains, audit hashing, tool execution, caching) lives in the Python
// sidecar and is accessed via this service.
//
// Wire format: proto3.  Transport: gRPC over Unix domain socket (default) or TCP.

syntax = "proto3";
package walacor.governance.v1;
option go_package = "proxy/pb";

// ─────────────────────────────────────────────────────────────────────────────
// Service
// ─────────────────────────────────────────────────────────────────────────────

service GovernanceEngine {
  // Pre-inference evaluation: authenticate caller, check model attestation,
  // evaluate pre-inference policies, verify budget, sanitize PII if enabled,
  // and resolve A/B test variants.  Called before the Go proxy forwards the
  // request to the LLM provider.
  rpc EvaluatePreInference(PreInferenceRequest) returns (PreInferenceResult);

  // Post-inference evaluation: run content analyzers (PII, toxicity, Llama Guard,
  // DLP) on the model response, evaluate post-inference policies, and restore
  // PII-sanitized tokens if applicable.  Called after the Go proxy receives the
  // LLM provider response.
  rpc EvaluatePostInference(PostInferenceRequest) returns (PostInferenceResult);

  // Persist an execution record to WAL + Walacor backend (dual-write).
  // Fire-and-forget from the Go proxy side — the sidecar handles retries.
  rpc RecordExecution(ExecutionRecord) returns (WriteResult);

  // Session chain: get the next (sequence_number, previous_record_hash) for a
  // session's Merkle chain.  Called before building the execution record.
  rpc NextChainValues(ChainRequest) returns (ChainValues);

  // Session chain: commit a new link after the execution record is written.
  rpc UpdateChain(ChainUpdate) returns (ChainResult);

  // Standalone content analysis — can run in parallel with the LLM call for
  // prompt-side analysis while the provider is processing.
  rpc AnalyzeContent(ContentPayload) returns (AnalysisResult);

  // Execute a tool (MCP server tool or built-in like web_search).
  // Used when the Go proxy detects tool_calls in the LLM response and the
  // tool strategy is "active".
  rpc ExecuteTool(ToolRequest) returns (ToolResponse);

  // Semantic cache lookup — check if an equivalent prompt was recently served.
  rpc CacheGet(CacheKey) returns (CacheResponse);

  // Semantic cache store — save a response for future cache hits.
  rpc CachePut(CachePutRequest) returns (CacheResult);

  // Health check — used by Go proxy readiness probes and startup sequencing.
  rpc HealthCheck(Empty) returns (HealthStatus);
}

// ─────────────────────────────────────────────────────────────────────────────
// Pre-inference messages
// ─────────────────────────────────────────────────────────────────────────────

// Request payload for EvaluatePreInference.
message PreInferenceRequest {
  // Caller authentication token (API key or JWT).
  string api_key = 1;

  // Target model identifier (e.g. "gpt-4o", "qwen3:4b").
  string model_id = 2;

  // Resolved provider name (e.g. "openai", "ollama", "anthropic").
  string provider = 3;

  // Full prompt text extracted from the request body.
  string prompt_text = 4;

  // Tenant identifier for multi-tenant budget/policy scoping.
  string tenant_id = 5;

  // Caller user identifier (from header, JWT, or API key mapping).
  string user_id = 6;

  // Arbitrary key-value metadata from the request (headers, tags, etc.).
  map<string, string> metadata = 7;

  // Tool definitions available for this request (OpenAI function-calling format).
  repeated ToolDefinition tools = 8;

  // Request classification for system-task detection (e.g. "synthetic", "batch").
  string request_type = 9;

  // Serialized A/B test configuration JSON (opaque to Go proxy).
  string ab_tests_json = 10;

  // Session identifier for chain continuity.
  string session_id = 11;
}

// Result from EvaluatePreInference.
message PreInferenceResult {
  // Whether the request is allowed to proceed to the LLM provider.
  bool allowed = 1;

  // Attestation ID for the model (e.g. "self-attested:qwen3:4b" or a control-plane UUID).
  string attestation_id = 2;

  // Pre-inference policy evaluation result ("pass", "deny", "warn").
  string policy_result = 3;

  // Policy version that was evaluated.
  int32 policy_version = 4;

  // Remaining token budget after reservation (absent if budgets not configured).
  optional int64 budget_remaining = 5;

  // Tool strategy determined by pre-checks ("active", "passive", "none").
  string tool_strategy = 6;

  // Human-readable denial reason (set only when allowed=false).
  string denial_reason = 7;

  // HTTP status code to return on denial (e.g. 403, 429).
  int32 denial_status_code = 8;

  // PII-sanitized prompt text (set only when PII sanitization is active).
  optional string sanitized_prompt = 9;

  // PII token-to-original mapping for post-inference restoration (JSON-encoded).
  string pii_mapping = 10;

  // Model ID after A/B test rewrite (may differ from the requested model_id).
  string model_id = 11;

  // Tools to inject into the LLM request (after capability filtering).
  repeated ToolDefinition resolved_tools = 12;
}

// ─────────────────────────────────────────────────────────────────────────────
// Post-inference messages
// ─────────────────────────────────────────────────────────────────────────────

// Request payload for EvaluatePostInference.
message PostInferenceRequest {
  // Model response content (main text).
  string content = 1;

  // Extracted reasoning/thinking content (from <think> blocks in reasoning models).
  string thinking_content = 2;

  // Model that generated the response.
  string model_id = 3;

  // Provider that served the response.
  string provider = 4;

  // Audit metadata accumulated during the request lifecycle.
  map<string, string> audit_metadata = 5;

  // Tool interactions that occurred during this request (active/passive).
  repeated ToolInteraction tool_interactions = 6;

  // Token usage from the provider response.
  int32 prompt_tokens = 7;
  int32 completion_tokens = 8;

  // End-to-end latency in milliseconds.
  double latency_ms = 9;

  // PII mapping from pre-inference (for restoring sanitized tokens).
  string pii_mapping = 10;

  // Session identifier.
  string session_id = 11;
}

// Result from EvaluatePostInference.
message PostInferenceResult {
  // Overall post-inference policy result ("pass", "block", "warn").
  string policy_result = 1;

  // Per-analyzer decisions from content analysis.
  repeated PolicyDecision decisions = 2;

  // Whether the response should be blocked from reaching the caller.
  bool blocked = 3;

  // Reason the response was blocked (set only when blocked=true).
  string block_reason = 4;

  // Content with PII tokens restored (set when PII sanitization was active).
  optional string restored_content = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// Execution record (audit trail)
// ─────────────────────────────────────────────────────────────────────────────

// Full execution record for dual-write to WAL + Walacor backend.
message ExecutionRecord {
  string execution_id = 1;
  string model_id = 2;
  string provider = 3;
  string prompt_text = 4;
  string response_content = 5;
  string thinking_content = 6;
  string attestation_id = 7;
  int32 policy_version = 8;
  string policy_result = 9;
  double latency_ms = 10;
  int32 prompt_tokens = 11;
  int32 completion_tokens = 12;
  int32 total_tokens = 13;
  map<string, string> metadata = 14;
  string session_id = 15;

  // Session chain fields (populated by the sidecar after chain computation).
  int32 sequence_number = 16;
  string previous_record_hash = 17;
  string record_hash = 18;

  // Timestamp in ISO 8601 format.
  string timestamp = 19;

  // Tenant and gateway identifiers.
  string tenant_id = 20;
  string gateway_id = 21;

  // User who made the request.
  string user = 22;

  // Provider-assigned request ID.
  string provider_request_id = 23;

  // Model integrity hash from provider (if available).
  string model_hash = 24;

  // A/B test variant ID (if request was part of an experiment).
  string variant_id = 25;

  // Tool interactions attached to this execution.
  repeated ToolInteraction tool_interactions = 26;

  // Retry lineage — execution_id of the original attempt (if this is a retry).
  string retry_of = 27;

  // Granular timing breakdown (JSON-encoded).
  string timings_json = 28;

  // Cache hit indicator.
  bool cache_hit = 29;
  int32 cached_tokens = 30;
  int32 cache_creation_tokens = 31;
}

// ─────────────────────────────────────────────────────────────────────────────
// Session chain messages
// ─────────────────────────────────────────────────────────────────────────────

// Request the next chain values for a session.
message ChainRequest {
  string session_id = 1;
}

// Next chain values returned by the sidecar.
message ChainValues {
  // Next sequence number (0 for a new session).
  int32 sequence_number = 1;

  // Hash of the previous record in the chain (GENESIS_HASH for first record).
  string previous_record_hash = 2;
}

// Commit a new link in the session chain after writing the execution record.
message ChainUpdate {
  string session_id = 1;
  string execution_id = 2;
  int32 policy_version = 3;
  string policy_result = 4;
  string timestamp = 5;
  int32 sequence_number = 6;
  string previous_record_hash = 7;
}

// Result of committing a chain link.
message ChainResult {
  // SHA3-512 record hash computed over the canonical metadata fields.
  string record_hash = 1;

  // Sequence number of the committed link.
  int32 sequence_number = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Content analysis messages
// ─────────────────────────────────────────────────────────────────────────────

// Standalone content analysis request.
message ContentPayload {
  // Text to analyze.
  string text = 1;

  // Whether this is "input" (prompt) or "output" (response) analysis.
  string analysis_type = 2;

  // Model ID for context (some analyzers adjust thresholds per model).
  string model_id = 3;
}

// Content analysis result aggregated across all configured analyzers.
message AnalysisResult {
  // Whether any PII was detected.
  bool pii_detected = 1;

  // Whether toxicity was flagged.
  bool toxicity_flagged = 2;

  // Llama Guard safety assessment result (e.g. "safe", "unsafe\nS4").
  string llama_guard_result = 3;

  // DLP (Data Loss Prevention) findings.
  repeated DLPFinding dlp_findings = 4;

  // Per-analyzer verdicts.
  repeated ContentVerdict verdicts = 5;
}

// A single DLP finding (e.g. credit card number, API key).
message DLPFinding {
  // Type of sensitive data found (e.g. "credit_card", "aws_access_key").
  string finding_type = 1;

  // Confidence score (0.0 – 1.0).
  double confidence = 2;

  // Character offset range in the source text.
  int32 start_offset = 3;
  int32 end_offset = 4;
}

// Per-analyzer verdict in the analysis result.
message ContentVerdict {
  // Analyzer identifier (e.g. "walacor.pii.v1", "llama_guard_3").
  string analyzer_id = 1;

  // Verdict: "pass", "warn", or "block".
  string verdict = 2;

  // Confidence score (0.0 – 1.0).
  double confidence = 3;

  // Safety category (e.g. "pii", "toxicity", "child_safety").
  string category = 4;

  // Human-readable reason.
  string reason = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// Tool messages
// ─────────────────────────────────────────────────────────────────────────────

// A tool definition in OpenAI function-calling format.
message ToolDefinition {
  // Tool name (e.g. "web_search", "get_weather").
  string name = 1;

  // Human-readable description of what the tool does.
  string description = 2;

  // JSON Schema for the tool's input parameters (JSON-encoded string).
  string input_schema_json = 3;

  // Name of the MCP server or built-in client providing this tool.
  string server_name = 4;
}

// Request to execute a tool.
message ToolRequest {
  // Tool name to invoke.
  string name = 1;

  // Tool arguments (JSON-encoded string).
  string arguments_json = 2;

  // Maximum execution time in milliseconds.
  int32 timeout_ms = 3;
}

// Result of a tool execution.
message ToolResponse {
  // Tool output content (text or JSON-encoded).
  string content = 1;

  // Whether the tool call resulted in an error.
  bool is_error = 2;

  // Execution duration in milliseconds.
  double duration_ms = 3;

  // Cited source URLs (populated by web_search and similar tools).
  repeated ToolSource sources = 4;
}

// A source citation from a tool result (e.g. web search result).
message ToolSource {
  string title = 1;
  string url = 2;
  string snippet = 3;
}

// A tool interaction record for the audit trail.
message ToolInteraction {
  // Provider-assigned tool call ID (e.g. "call_abc123").
  string tool_id = 1;

  // Tool type ("function", "web_search", "code_interpreter", "file_search").
  string tool_type = 2;

  // Tool/function name.
  string tool_name = 3;

  // Input data sent to the tool (JSON-encoded).
  string input_data = 4;

  // Output data returned from the tool (JSON-encoded).
  string output_data = 5;

  // SHA3-512 hash of the input data.
  string input_hash = 6;

  // SHA3-512 hash of the output data.
  string output_hash = 7;

  // Cited sources from the tool (for web_search, etc.).
  repeated ToolSource sources = 8;

  // Execution duration in milliseconds.
  double duration_ms = 9;

  // Content analysis results on the tool output (analyzer_id -> verdict JSON).
  map<string, string> content_analysis = 10;

  // Tool loop iteration number (1-based).
  int32 iteration = 11;

  // Whether the tool call resulted in an error.
  bool is_error = 12;
}

// ─────────────────────────────────────────────────────────────────────────────
// Cache messages
// ─────────────────────────────────────────────────────────────────────────────

// Semantic cache lookup key.
message CacheKey {
  // Prompt text to look up.
  string prompt_text = 1;

  // Model ID for cache scoping (different models produce different responses).
  string model_id = 2;
}

// Semantic cache lookup result.
message CacheResponse {
  // Whether a cache entry was found.
  bool hit = 1;

  // Cached response body (JSON-encoded; empty if hit=false).
  string response_body = 2;

  // When the cache entry was stored (ISO 8601; empty if hit=false).
  string cached_at = 3;
}

// Semantic cache store request.
message CachePutRequest {
  // Prompt text (cache key).
  string prompt_text = 1;

  // Model ID (cache key scope).
  string model_id = 2;

  // Response body to cache (JSON-encoded).
  string response_body = 3;
}

// Result of a cache store operation.
message CacheResult {
  bool success = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Health / common messages
// ─────────────────────────────────────────────────────────────────────────────

// Policy evaluation decision (used in post-inference results).
message PolicyDecision {
  // Policy name or rule identifier.
  string policy_name = 1;

  // Evaluation result ("pass", "warn", "block").
  string result = 2;

  // Human-readable details about the decision.
  string details = 3;
}

// Result of writing an execution record.
message WriteResult {
  // Whether the write succeeded.
  bool success = 1;

  // Execution ID assigned to the record.
  string execution_id = 2;

  // Error message (set only when success=false).
  string error_message = 3;
}

// Empty request (for HealthCheck).
message Empty {}

// Sidecar health status.
message HealthStatus {
  // Whether the sidecar is healthy and ready to serve.
  bool healthy = 1;

  // Sidecar version string.
  string version = 2;

  // Per-model capability cache (model_id -> JSON-encoded capabilities).
  map<string, string> model_capabilities = 3;

  // Number of active sessions in the chain tracker.
  int32 active_sessions = 4;

  // Sidecar uptime in seconds.
  double uptime_seconds = 5;

  // Number of configured content analyzers.
  int32 content_analyzer_count = 6;

  // Whether governance is enabled (vs. transparent proxy / audit-only).
  bool governance_enabled = 7;
}
